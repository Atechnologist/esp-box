name: Build ESP32-S3-BOX Factory Demo

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      # ---------------------------
      # Fix Git ownership
      # ---------------------------
      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory '*'

      # ---------------------------
      # Build Factory Demo
      # ---------------------------
      - name: Build Factory Demo for ESP32-S3-BOX
        shell: bash
        run: |
          set -e

          # Load ESP-IDF environment
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          # Target
          idf.py set-target esp32s3

          # Apply correct config
          cp sdkconfig.ci.box sdkconfig

          # Clean + build
          idf.py fullclean build

          # Merge firmware using generated flash layout
          cd build

          echo "📦 Merging firmware using flash_args..."

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            $(cat flash_args)

      # ---------------------------
      # Upload artifact
      # ---------------------------
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-S3-BOX-factory-demo
          path: examples/factory_demo/build/factory_demo_box.bin
