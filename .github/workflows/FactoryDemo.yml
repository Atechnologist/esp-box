name: ESP32-S3-BOX Factory + Web

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1

    steps:
      # 1️⃣ Checkout official ESP-BOX
      - name: Checkout ESP-BOX
        uses: actions/checkout@v4
        with:
          repository: espressif/esp-box
          submodules: recursive

      # 2️⃣ Fix git safe directory
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory '*'

      # 3️⃣ Inject YOUR code (FORCED overwrite)
      - name: Inject Custom Main + Web
        run: |
          set -e

          echo "🔥 Removing original main..."
          rm -rf examples/factory_demo/main/*

          echo "📦 Copying custom files..."
          cp -v $GITHUB_WORKSPACE/custom/main/* examples/factory_demo/main/

          echo "📁 Final main content:"
          ls -l examples/factory_demo/main/

      # 4️⃣ Build factory demo
      - name: Build Firmware
        run: |
          set -e

          . $IDF_PATH/export.sh

          cd examples/factory_demo

          idf.py set-target esp32s3

          cp sdkconfig.ci.box sdkconfig

          idf.py fullclean build

      # 5️⃣ Merge firmware
      - name: Merge Firmware
        run: |
          set -e

          cd examples/factory_demo/build

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_web.bin \
            --flash_mode dio \
            --flash_size 16MB \
            $(cat flash_args)

      # 6️⃣ Upload artifact
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-S3-BOX-Web
          path: examples/factory_demo/build/factory_demo_web.bin
