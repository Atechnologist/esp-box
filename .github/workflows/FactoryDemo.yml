name: ESP32-S3-BOX Factory Demo (REAL FULL BUILD)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1

    steps:
      # =============================
      # 1. Checkout FULL repo
      # =============================
      - name: Checkout FULL Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # =============================
      # 2. Verify Factory Demo exists
      # =============================
      - name: Verify factory demo
        run: |
          echo "📁 Listing factory_demo..."
          ls -lah examples/factory_demo

          if [ ! -f "examples/factory_demo/sdkconfig.ci.box" ]; then
            echo "❌ ERROR: factory_demo is missing or incomplete"
            exit 1
          fi

      # =============================
      # 3. Build REAL Factory Demo
      # =============================
      - name: Build Factory Demo (FULL)
        run: |
          set -e
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          echo "🚀 Building REAL factory demo..."

          idf.py set-target esp32s3
          cp sdkconfig.ci.box sdkconfig

          idf.py fullclean
          idf.py build

          echo "📦 Build output:"
          ls -lah build

          # 🔥 MUST EXIST (otherwise wrong build)
          if [ ! -d "build/srmodels" ]; then
            echo "❌ srmodels folder missing → WRONG BUILD"
            exit 1
          fi

          if [ ! -f "build/srmodels/srmodels.bin" ]; then
            echo "❌ srmodels.bin missing → voice NOT built"
            exit 1
          fi

          echo "✅ Voice models OK"

          # storage (optional fallback)
          if [ ! -f "build/storage.bin" ]; then
            echo "⚠ storage.bin missing → creating fallback"
            dd if=/dev/zero of=build/storage.bin bs=1K count=64
          fi

      # =============================
      # 4. Merge FULL firmware
      # =============================
      - name: Merge Firmware
        run: |
          set -e
          cd examples/factory_demo/build

          echo "🔍 Checking required files..."

          for f in \
            bootloader/bootloader.bin \
            partition_table/partition-table.bin \
            ota_data_initial.bin \
            storage.bin \
            srmodels/srmodels.bin
          do
            if [ ! -f "$f" ]; then
              echo "❌ Missing $f"
              exit 1
            fi
          done

          echo "🔍 Finding app binary..."

          APP_BIN=$(ls *.bin | grep -v bootloader | grep -v partition | grep -v factory_demo_box.bin | head -n1)

          if [ -z "$APP_BIN" ]; then
            echo "❌ App binary not found"
            exit 1
          fi

          echo "✅ App binary: $APP_BIN"

          echo "🚀 Merging FULL firmware..."

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x16000 ota_data_initial.bin \
            0x20000 "$APP_BIN" \
            0x43a000 storage.bin \
            0x6c4000 srmodels/srmodels.bin

          echo "✅ FULL firmware ready"

      # =============================
      # 5. Upload
      # =============================
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-factory-full
          path: examples/factory_demo/build/factory_demo_box.bin
