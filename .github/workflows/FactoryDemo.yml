name: Build ESP32-S3-BOX Factory Demo

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      # ---------------------------
      # Checkout repo
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---------------------------
      # Fix Git safe directory
      # ---------------------------
      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory '*'

      # ---------------------------
      # 🔥 CRITICAL FIX: remove registry dependencies
      # ---------------------------
      - name: Remove idf_component.yml (disable registry)
        run: |
          echo "🚫 Removing idf_component.yml to disable registry..."
          find . -name "idf_component.yml" -delete

      # ---------------------------
      # Build Factory Demo
      # ---------------------------
      - name: Build Factory Demo
        shell: bash
        run: |
          set -e

          . $IDF_PATH/export.sh

          cd examples/factory_demo

          idf.py set-target esp32s3

          cp sdkconfig.ci.box sdkconfig

          idf.py fullclean
          idf.py build

          cd build

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            $(cat flash_args)

      # ---------------------------
      # Upload firmware
      # ---------------------------
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-S3-BOX-factory-demo
          path: examples/factory_demo/build/factory_demo_box.bin
