name: ESP32-S3-BOX Factory FULL Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Factory Demo (FULL)
        run: |
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          # 🔥 CLEAN EVERYTHING
          rm -rf build
          rm -rf managed_components
          rm -f sdkconfig

          # Set correct target
          idf.py set-target esp32s3

          # Use correct config
          cp sdkconfig.ci.box sdkconfig

          # 🔥 FORCE DEPENDENCY INSTALL
          idf.py reconfigure

          # Build full project (with ESP-SR, BSP, UI)
          idf.py build

          # Merge firmware
          cd build
          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            $(cat flash_args)

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: factory-demo-full
          path: examples/factory_demo/build/factory_demo_box.bin
