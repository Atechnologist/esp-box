name: ESP32-S3-BOX Factory Demo (Stable)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1

    steps:
      # =============================
      # 1. Checkout
      # =============================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # =============================
      # 2. Build Factory Demo
      # =============================
      - name: Build Factory Demo
        run: |
          set -e
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          idf.py set-target esp32s3
          cp sdkconfig.ci.box sdkconfig

          idf.py fullclean
          idf.py build

      # =============================
      # 3. Merge Firmware (STRICT)
      # =============================
      - name: Merge Firmware
        run: |
          cd examples/factory_demo/build

          pip install --upgrade esptool

          # Validate required files (critical)
          for f in \
            bootloader/bootloader.bin \
            partition_table/partition-table.bin \
            ota_data_initial.bin \
            storage.bin \
            srmodels/srmodels.bin; do

            if [ ! -f "$f" ]; then
              echo "❌ Missing $f"
              exit 1
            fi
          done

          # Get app binary
          APP_BIN=$(ls *.bin | grep -v bootloader | grep -v partition | grep -v factory_demo_box.bin | head -n1)

          if [ -z "$APP_BIN" ]; then
            echo "❌ App binary not found"
            exit 1
          fi

          # Merge
          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x16000 ota_data_initial.bin \
            0x20000 $APP_BIN \
            0x43a000 storage.bin \
            0x6c4000 srmodels/srmodels.bin

      # =============================
      # 4. Upload
      # =============================
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-factory-full
          path: examples/factory_demo/build/factory_demo_box.bin
