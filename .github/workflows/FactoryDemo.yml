name: ESP32-S3-BOX Factory Demo (CI FULL FIXED)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1

    steps:
      # =============================
      # 1. Checkout FULL repo + submodules
      # =============================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # =============================
      # 2. Initialize submodules explicitly
      # =============================
      - name: Init Submodules
        run: |
          git submodule update --init --recursive

      # =============================
      # 3. Verify factory demo exists
      # =============================
      - name: Verify Factory Demo
        run: |
          echo "📁 Listing factory_demo..."
          ls -lah examples/factory_demo

          if [ ! -f "examples/factory_demo/sdkconfig.ci.box" ]; then
            echo "❌ factory_demo project missing or incomplete"
            exit 1
          fi

      # =============================
      # 4. Build Factory Demo (CI SAFE)
      # =============================
      - name: Build Factory Demo
        run: |
          set -e
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          echo "🧹 Cleaning..."
          rm -rf build
          rm -f sdkconfig

          echo "⚙️ Setting target..."
          idf.py set-target esp32s3

          echo "📄 Applying CI config..."
          cp sdkconfig.ci.box sdkconfig

          echo "🔄 Reconfiguring project..."
          idf.py reconfigure

          echo "🚀 Building project..."
          idf.py build

          echo "📦 Build contents:"
          ls -lah build

          # =============================
          # Validate srmodels
          # =============================
          if [ ! -d build/srmodels ]; then
            echo "❌ srmodels directory missing → ESP-SR not enabled"
            exit 1
          fi

          if [ ! -f build/srmodels/srmodels.bin ]; then
            echo "❌ srmodels.bin missing"
            exit 1
          fi

          echo "✅ srmodels OK"

          # =============================
          # Ensure storage exists
          # =============================
          if [ ! -f build/storage.bin ]; then
            echo "⚠ storage.bin missing → creating fallback"
            dd if=/dev/zero of=build/storage.bin bs=1K count=64
          fi

      # =============================
      # 5. Merge Firmware
      # =============================
      - name: Merge Firmware
        run: |
          set -e
          cd examples/factory_demo/build

          echo "🔍 Checking required binaries..."

          for f in \
            bootloader/bootloader.bin \
            partition_table/partition-table.bin \
            ota_data_initial.bin \
            storage.bin \
            srmodels/srmodels.bin
          do
            if [ ! -f "$f" ]; then
              echo "❌ Missing $f"
              exit 1
            fi
          done

          echo "🔍 Detecting app binary..."

          APP_BIN=$(ls *.bin | grep -v bootloader | grep -v partition | grep -v factory_demo_box.bin | head -n1)

          if [ -z "$APP_BIN" ]; then
            echo "❌ App binary not found"
            exit 1
          fi

          echo "✅ Using app binary: $APP_BIN"

          echo "🚀 Merging full firmware..."

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x16000 ota_data_initial.bin \
            0x20000 "$APP_BIN" \
            0x43a000 storage.bin \
            0x6c4000 srmodels/srmodels.bin

          echo "✅ Firmware successfully generated"

      # =============================
      # 6. Upload artifact
      # =============================
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-factory-full
          path: examples/factory_demo/build/factory_demo_box.bin
