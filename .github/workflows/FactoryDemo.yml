name: Build ESP32-S3-BOX Factory Demo

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      # Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Fix git issue
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory '*'

      # 🔧 FIX dependencies (important)
      - name: Patch broken dependencies
        run: |
          find . -name "idf_component.yml" -exec sed -i '/esp-lcd-touch/d' {} \;
          find . -name "idf_component.yml" -exec sed -i '/esp-lcd-ili9341/d' {} \;

      # Build
      - name: Build Factory Demo
        shell: bash
        run: |
          set -e

          . $IDF_PATH/export.sh

          cd examples/factory_demo

          idf.py set-target esp32s3

          cp sdkconfig.ci.box sdkconfig

          idf.py fullclean
          idf.py build

          cd build

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            $(cat flash_args)

      # Upload
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-S3-BOX-factory-demo
          path: examples/factory_demo/build/factory_demo_box.bin
