name: Build ESP32-S3-BOX Factory Demo

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-factory-demo:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---------------------------
      # Fix Git ownership issue
      # ---------------------------
      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory '*'

      # ---------------------------
      # Ensure tools available
      # ---------------------------
      - name: Verify Python & Pip
        run: |
          python3 --version
          python3 -m ensurepip --upgrade || true
          python3 -m pip install --upgrade pip esptool

      # ---------------------------
      # Init submodules explicitly
      # ---------------------------
      - name: Init Submodules
        run: |
          git submodule update --init --recursive

      # ---------------------------
      # Build Factory Demo
      # ---------------------------
      - name: Build Factory Demo
        shell: bash
        run: |
          set -e

          # Load ESP-IDF environment
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          # Set target
          idf.py set-target esp32s3

          # Use CI config if available
          if [ -f sdkconfig.ci.box ]; then
            cp sdkconfig.ci.box sdkconfig
          fi

          # Clean + build
          idf.py fullclean
          idf.py build

      # ---------------------------
      # Validate build artifacts
      # ---------------------------
      - name: Check Build Outputs
        run: |
          set -e
          cd examples/factory_demo/build

          echo "🔍 Checking required files..."

          for f in \
            bootloader/bootloader.bin \
            partition_table/partition-table.bin \
            ota_data_initial.bin \
            storage.bin; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing $f"
              exit 1
            fi
          done

          # srmodels may exist depending on config
          if [ ! -d "srmodels" ]; then
            echo "⚠️ srmodels folder missing (may be normal depending on config)"
          fi

      # ---------------------------
      # Merge firmware
      # ---------------------------
      - name: Merge Firmware
        run: |
          set -e
          cd examples/factory_demo/build

          echo "📦 Merging firmware..."

          APP_BIN=$(ls *.bin | grep -v bootloader | grep -v partition | grep -v factory_demo_box.bin | head -n1)

          if [ -z "$APP_BIN" ]; then
            echo "❌ Main app binary not found"
            exit 1
          fi

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x16000 ota_data_initial.bin \
            0x20000 $APP_BIN

      # ---------------------------
      # Upload artifact
      # ---------------------------
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-S3-BOX-factory-demo
          path: examples/factory_demo/build/factory_demo_box.bin
