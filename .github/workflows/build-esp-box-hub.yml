name: ESP32-S3 Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IDF_TARGET: esp32s3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          version: v5.1

      - name: Show directory structure
        run: |
          pwd
          ls -R

      - name: Clean previous builds
        run: idf.py fullclean

      - name: Set target
        run: idf.py set-target esp32s3

      - name: Build factory_demo
        run: idf.py build
