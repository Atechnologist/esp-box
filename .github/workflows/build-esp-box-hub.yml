name: Build ESP32-S3-BOX Factory Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IDF_PATH: /opt/esp/idf
      IDF_TARGET: esp32s3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true  # ensure submodules/components are fetched

      - name: Set up ESP-IDF
        uses: espressif/setup-esp-idf@v2
        with:
          version: v5.1

      - name: Add ESP-IDF tools to PATH
        run: |
          echo "$IDF_PATH/tools" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r $IDF_PATH/tools/requirements/requirements.all.txt

      - name: Add required components via IDF Component Manager
        run: |
          idf.py add-dependency espressif/esp-box ^3.0.5
          idf.py add-dependency espressif/esp-box-3 ^1.1.3
          idf.py add-dependency espressif/esp-box-lite ^2.0.4
          idf.py add-dependency lvgl/lvgl ^8.4.0
          idf.py add-dependency espressif/esp-dsp ^1.7.1
          idf.py add-dependency espressif/esp_lcd_ili9341 ^1.2.0
          idf.py add-dependency espressif/esp_lcd_touch ^1.2.1
          # Only add components you actually have, do NOT include esp_sr if missing

      - name: Configure project
        working-directory: examples/factory_demo
        run: idf.py set-target esp32s3

      - name: Build project
        working-directory: examples/factory_demo
        run: idf.py build -DCCACHE_ENABLE=1

      - name: Show build output size
        working-directory: examples/factory_demo
        run: idf.py size
