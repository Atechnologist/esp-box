name: ESP32-S3 Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set IDF target
        run: echo "IDF_TARGET=esp32s3" >> $GITHUB_ENV

      - name: Create project structure if missing
        run: |
          mkdir -p main
          # Root CMakeLists.txt
          if [ ! -f CMakeLists.txt ]; then
            echo 'cmake_minimum_required(VERSION 3.24)' > CMakeLists.txt
            echo 'include($ENV{IDF_PATH}/tools/cmake/project.cmake)' >> CMakeLists.txt
            echo 'project(factory_demo)' >> CMakeLists.txt
          fi
          # main/CMakeLists.txt
          if [ ! -f main/CMakeLists.txt ]; then
            echo 'idf_component_register(' > main/CMakeLists.txt
            echo '    SRCS "main.c"' >> main/CMakeLists.txt
            echo '    INCLUDE_DIRS "."' >> main/CMakeLists.txt
            echo ')' >> main/CMakeLists.txt
          fi
          # main/main.c
          if [ ! -f main/main.c ]; then
            printf '%s\n' '#include "freertos/FreeRTOS.h"' \
            '#include "freertos/task.h"' \
            '#include "esp_log.h"' \
            '' \
            'void app_main(void)' \
            '{' \
            '    while (1) {' \
            '        ESP_LOGI("APP", "Hello ESP32-S3!");' \
            '        vTaskDelay(1000 / portTICK_PERIOD_MS);' \
            '    }' \
            '}' > main/main.c
          fi
          # sdkconfig.defaults
          if [ ! -f sdkconfig.defaults ]; then
            echo 'CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y' > sdkconfig.defaults
            echo 'CONFIG_FREERTOS_UNICORE=y' >> sdkconfig.defaults
          fi

      - name: Build ESP-IDF project
        run: idf.py build
