name: Build ESP32-S3

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IDF_TARGET: esp32s3

    steps:
      - uses: actions/checkout@v3

      - uses: espressif/esp-idf-ci-action@v1
        with:
          version: v5.1

      - run: idf.py fullclean
      - run: idf.py set-target esp32s3
      - run: idf.py build
