name: Build ESP32-S3-BOX Factory Demo

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Fix Git safe directory
        run: git config --global --add safe.directory /__w/esp-box/esp-box

      # Cache ESP-IDF dependencies and build outputs
      - name: Cache ESP-IDF build
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache
            ~/.espressif
            examples/factory_demo/build
          key: esp-idf-${{ runner.os }}-${{ hashFiles('**/idf_component.yml') }}

      - name: Build firmware
        shell: bash
        run: |
          set -e

          # Load ESP-IDF tools
          . $IDF_PATH/export.sh

          cd examples/factory_demo

          idf.py set-target esp32s3

          cp sdkconfig.ci.box sdkconfig

          idf.py build

      - name: Merge flash image
        shell: bash
        run: |
          set -e

          cd examples/factory_demo/build

          pip install --upgrade esptool

          APP_BIN=$(ls *.bin | grep -v bootloader | grep -v partition | head -n1)

          esptool.py --chip esp32s3 merge_bin \
            -o factory_demo_box.bin \
            --flash_mode dio \
            --flash_size 16MB \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x16000 ota_data_initial.bin \
            0x20000 $APP_BIN \
            0x43a000 storage.bin \
            0x6c4000 srmodels/srmodels.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-S3-BOX-firmware
          path: examples/factory_demo/build/factory_demo_box.bin
