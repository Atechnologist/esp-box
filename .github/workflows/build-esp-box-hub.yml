name: ESP32-S3 Factory Demo CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IDF_PATH: /opt/esp/idf

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up ESP-IDF tools
      uses: espressif/esp-idf-action@v2
      with:
        version: v5.1.7

    - name: Export ESP-IDF environment
      shell: bash
      run: |
        . $IDF_PATH/export.sh

    - name: Add IDF dependencies
      shell: bash
      run: |
        cd examples/factory_demo
        idf.py add-dependency espressif/esp-sr@1.9.5
        idf.py add-dependency espressif/esp-lcd-ili9341@1.2.0
        idf.py add-dependency espressif/esp-lcd-touch@1.2.1
        idf.py add-dependency espressif/esp-lcd-touch-gt911@1.2.0~1
        idf.py add-dependency lvgl/lvgl@8.4.0
        idf.py add-dependency espressif/esp-box-3@1.1.3
        idf.py add-dependency espressif/esp-box-lite@2.0.4

    - name: Full clean
      shell: bash
      run: |
        cd examples/factory_demo
        idf.py fullclean

    - name: Set target to ESP32-S3
      shell: bash
      run: |
        cd examples/factory_demo
        idf.py set-target esp32s3

    - name: Build project
      shell: bash
      run: |
        cd examples/factory_demo
        idf.py build
