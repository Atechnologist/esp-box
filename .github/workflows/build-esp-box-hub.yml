name: ESP-BOX Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show IDF version
        run: idf.py --version

      - name: Install dependencies
        run: |
          cd examples/factory_demo
          idf.py reconfigure

      - name: Build firmware
        run: |
          cd examples/factory_demo
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp-box-firmware
          path: |
            examples/factory_demo/build/*.bin
            examples/factory_demo/build/*.elf
