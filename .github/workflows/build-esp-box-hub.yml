name: Build ESP32-S3-BOX Factory Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IDF_PATH: ${{ github.workspace }}/esp-idf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget flex bison gperf python3-pip cmake ninja-build ccache libffi-dev libssl-dev dfu-util

      - name: Install ESP-IDF
        run: |
          git clone --branch v5.1.7 --recursive https://github.com/espressif/esp-idf.git $IDF_PATH
          cd $IDF_PATH
          ./install.sh
        shell: bash

      - name: Export ESP-IDF environment
        run: |
          . $IDF_PATH/export.sh
        shell: bash

      - name: Add component dependencies
        run: |
          . $IDF_PATH/export.sh
          idf.py add-dependency espressif/esp-dsp ^1.7.1
          idf.py add-dependency espressif/esp_lcd_ili9341 ^1.2.0
          idf.py add-dependency espressif/esp_lcd_touch ^1.2.1
          idf.py add-dependency lvgl/lvgl ^8.4.0
          idf.py add-dependency espressif/mdns ^1.10.1
          idf.py add-dependency espressif/led_strip ^2.0.0
          idf.py add-dependency esp-box ^3.5.0

      - name: Build factory_demo
        run: |
          . $IDF_PATH/export.sh
          cd examples/factory_demo
          idf.py fullclean
          idf.py build
