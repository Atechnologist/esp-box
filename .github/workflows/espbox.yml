name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Fix Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE


      - name: Clean old ESP-BOX project
        shell: bash
        run: |
          echo "Cleaning repository..."
          rm -rf build
          rm -rf managed_components
          rm -f idf_component.yml
          rm -f main/idf_component.yml
          rm -f sdkconfig
          rm -f sdkconfig.defaults
          rm -f Kconfig.projbuild


      - name: Generate minimal ESP-IDF project
        shell: bash
        run: |

          echo "Generating project..."

          mkdir -p main
          mkdir -p components/relay_control

          ###################################
          # Root CMake
          ###################################

          cat << 'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.16)
          include($ENV{IDF_PATH}/tools/cmake/project.cmake)
          project(esp_box_hub)
          EOF


          ###################################
          # Main firmware
          ###################################

          cat << 'EOF' > main/main.c
          #include "freertos/FreeRTOS.h"
          #include "freertos/task.h"
          #include "esp_log.h"

          static const char *TAG = "ESP_BOX";

          void app_main(void)
          {
              ESP_LOGI(TAG, "ESP BOX HUB STARTED");

              while (1)
              {
                  ESP_LOGI(TAG, "Hub running...");
                  vTaskDelay(pdMS_TO_TICKS(5000));
              }
          }
          EOF


          ###################################
          # main CMake
          ###################################

          cat << 'EOF' > main/CMakeLists.txt
          idf_component_register(
              SRCS "main.c"
              INCLUDE_DIRS "."
          )
          EOF


      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build


      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            build/*.bin
            build/*.elf
