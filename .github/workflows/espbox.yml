name: ESP-BOX Firmware Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =============================
      # 1. Checkout code
      # =============================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =============================
      # 2. Cache ESP-IDF (optional but speeds up builds)
      # =============================
      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/.cache/pip
          key: ${{ runner.os }}-esp-idf

      # =============================
      # 3. Install ESP-IDF
      # =============================
      - name: Install ESP-IDF
        run: |
          git clone -b v5.2 --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
          cd $HOME/esp-idf
          ./install.sh esp32s3
          . ./export.sh

      # =============================
      # 4. Prepare environment
      # =============================
      - name: Set ESP-IDF environment
        run: |
          echo "IDF_PATH=$HOME/esp-idf" >> $GITHUB_ENV
          echo "$HOME/esp-idf/tools" >> $GITHUB_PATH

      # =============================
      # 5. Copy / ensure model exists
      # =============================
      - name: Prepare model file
        run: |
          mkdir -p examples/esp-box/firmware/main/model

          if [ -f examples/esp-box/firmware/main/model/model.bin ]; then
            echo "Model already exists"
          else
            echo "⚠️ No model found — creating placeholder"
            # You should replace this with your real model
            touch examples/esp-box/firmware/main/model/model.bin
          fi

      # =============================
      # 6. Install Python dependencies + components
      # =============================
      - name: Install project dependencies
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          idf.py set-target esp32s3

          # This is what creates managed_components/
          idf.py install

      # =============================
      # 7. Build firmware
      # =============================
      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          idf.py build

      # =============================
      # 8. Upload artifacts
      # =============================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp-box-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/*.elf
