name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build firmware
        shell: bash
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh   # Load ESP-IDF environment
          idf.py set-target esp32s3
          idf.py build

      - name: Create web flash manifest
        shell: bash
        run: |
          cd examples/esp-box/firmware/build
          printf '{\n  "name": "ESP-BOX Hub",\n  "version": "1.0",\n  "builds": [\n    {\n      "chipFamily": "ESP32-S3",\n      "parts": [\n        { "path": "bootloader/bootloader.bin", "offset": 0 },\n        { "path": "partition_table/partition-table.bin", "offset": 32768 },\n        { "path": "esp_box_hub.bin", "offset": 65536 }\n      ]\n    }\n  ]\n}\n' > manifest.json

      - name: Upload firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: espbox-webflash
          path: |
            examples/esp-box/firmware/build/bootloader/bootloader.bin
            examples/esp-box/firmware/build/partition_table/partition-table.bin
            examples/esp-box/firmware/build/esp_box_hub.bin
            examples/esp-box/firmware/build/manifest.json
