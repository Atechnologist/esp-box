name: Build ESP-BOX Firmware

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1

      - name: Build firmware
        working-directory: examples/esp-box/firmware
        run: idf.py build

      - name: Prepare firmware artifacts
        working-directory: examples/esp-box/firmware/build
        run: |
          BIN_NAME=$(ls *.bin | grep -v bootloader | grep -v partition | head -n 1)
          echo "Detected firmware: $BIN_NAME"

          echo "{" > manifest.json
          echo "  \"name\": \"ESP-BOX Hub\"," >> manifest.json
          echo "  \"version\": \"1.0\"," >> manifest.json
          echo "  \"builds\": [" >> manifest.json
          echo "    {" >> manifest.json
          echo "      \"chipFamily\": \"ESP32-S3\"," >> manifest.json
          echo "      \"parts\": [" >> manifest.json
          echo "        { \"path\": \"bootloader/bootloader.bin\", \"offset\": 0 }," >> manifest.json
          echo "        { \"path\": \"partition_table/partition-table.bin\", \"offset\": 32768 }," >> manifest.json
          echo "        { \"path\": \"$BIN_NAME\", \"offset\": 65536 }" >> manifest.json
          echo "      ]" >> manifest.json
          echo "    }" >> manifest.json
          echo "  ]" >> manifest.json
          echo "}" >> manifest.json

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
            examples/esp-box/firmware/build/manifest.json
