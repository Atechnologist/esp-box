name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 🔧 BUILD
      - name: Build firmware
        shell: bash
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      # 🔍 DEBUG (very useful)
      - name: List build output
        shell: bash
        run: |
          echo "==== ROOT ===="
          ls -la

          echo "==== FIRMWARE ===="
          ls -la examples/esp-box/firmware

          echo "==== BUILD ===="
          ls -la examples/esp-box/firmware/build

      # 📦 CREATE MANIFEST (AUTO-DETECT BIN)
      - name: Create Web Flash manifest
        shell: bash
        run: |
          cd examples/esp-box/firmware/build

          BIN_NAME=$(ls *.bin | grep -v bootloader | grep -v partition | head -n 1)

          echo "Detected firmware: $BIN_NAME"

          printf '{
            "name": "ESP-BOX Hub",
            "version": "2.0",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "bootloader/bootloader.bin", "offset": 0 },
                  { "path": "partition_table/partition-table.bin
