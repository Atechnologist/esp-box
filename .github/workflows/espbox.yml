name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 🔥 STEP 1: Download ESP-SR model
      - name: Download ESP-SR model
        run: |
          cd examples/esp-box/firmware/main
          mkdir -p model
          
          # Download official ESP-SR model (example)
          wget -O model/model.bin \
          https://dl.espressif.com/public/esp-sr/models/esp32s3/wn9_hilexin_zh_en/model.bin

      # 🔥 STEP 2: Build firmware
      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build

      # 🔥 STEP 3: Upload artifacts
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
