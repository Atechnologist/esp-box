name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 🔥 ADD THIS (critical fix)
      - name: Get ESP-BOX BSP (local component)
        run: |
          cd examples/esp-box/firmware
          mkdir -p components
          git clone --depth 1 https://github.com/espressif/esp-box.git components/esp-box

      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
