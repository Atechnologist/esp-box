name: Build ESP-BOX Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          cd examples/esp-box/firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Debug paths (IMPORTANT)
        run: |
          echo "ROOT:"
          ls -la

          echo "ESP-BOX PATH:"
          ls -la examples/esp-box/firmware

          echo "BUILD PATH:"
          ls -la examples/esp-box/firmware/build

      - name: Create manifest
        run: |
          cd examples/esp-box/firmware/build

          BIN_NAME=$(ls *.bin | grep -v bootloader | grep -v partition | head -n 1)

          echo "Using firmware: $BIN_NAME"

          printf '{
            "name": "ESP-BOX Hub",
            "version": "2.0",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "bootloader/bootloader.bin", "offset": 0 },
                  { "path": "partition_table/partition-table.bin", "offset": 32768 },
                  { "path": "'$BIN_NAME'", "offset": 65536 }
                ]
              }
            ]
          }' > manifest.json

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox
          path: |
            examples/esp-box/firmware/build/bootloader/bootloader.bin
            examples/esp-box/firmware/build/partition_table/partition-table.bin
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/manifest.json
