name: ESP-BOX Firmware Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =============================
      # 1. Checkout
      # =============================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =============================
      # 2. Cache ESP-IDF
      # =============================
      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/.cache/pip
          key: ${{ runner.os }}-esp-idf

      # =============================
      # 3. Install ESP-IDF
      # =============================
      - name: Install ESP-IDF
        run: |
          git clone -b v5.2 --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
          cd $HOME/esp-idf
          ./install.sh esp32s3

      # =============================
      # 4. Export environment
      # =============================
      - name: Set ESP-IDF environment
        run: |
          echo "IDF_PATH=$HOME/esp-idf" >> $GITHUB_ENV

      # =============================
      # 5. Prepare model (safe)
      # =============================
      - name: Prepare model
        run: |
          mkdir -p examples/esp-box/firmware/main/model

          if [ -f model.bin ]; then
            echo "Using provided model.bin"
            cp model.bin examples/esp-box/firmware/main/model/model.bin
          else
            echo "No model → creating placeholder"
            touch examples/esp-box/firmware/main/model/model.bin
          fi

      # =============================
      # 6. FULL CLEAN (critical fix)
      # =============================
      - name: Clean config + build cache
        run: |
          cd examples/esp-box/firmware

          rm -rf build
          rm -f sdkconfig
          rm -f sdkconfig.old

      # =============================
      # 7. Configure project
      # =============================
      - name: Configure project
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          export IDF_TARGET=esp32s3
          export ESPTOOLPY_FLASHSIZE=16MB

          idf.py set-target esp32s3

          # Install dependencies (creates managed_components)
          idf.py install

          # Force flash size at config stage
          idf.py -D ESPTOOLPY_FLASHSIZE=16MB reconfigure

      # =============================
      # 8. Build firmware
      # =============================
      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          export IDF_TARGET=esp32s3
          export ESPTOOLPY_FLASHSIZE=16MB

          idf.py build

      # =============================
      # 9. Upload artifacts
      # =============================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp-box-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/*.elf
            examples/esp-box/firmware/build/*.map
