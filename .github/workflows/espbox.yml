name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Generate firmware project
        shell: bash
        run: |
          mkdir -p firmware/main

          printf "cmake_minimum_required(VERSION 3.16)\ninclude(\$ENV{IDF_PATH}/tools/cmake/project.cmake)\nproject(esp_box_hub)\n" > firmware/CMakeLists.txt

          printf "#include \"freertos/FreeRTOS.h\"\n#include \"freertos/task.h\"\n#include \"esp_log.h\"\n\nstatic const char *TAG = \"ESP_BOX\";\n\nvoid app_main(void)\n{\n    ESP_LOGI(TAG, \"ESP BOX HUB STARTED\");\n\n    while (1)\n    {\n        ESP_LOGI(TAG, \"Hub running...\");\n        vTaskDelay(pdMS_TO_TICKS(5000));\n    }\n}\n" > firmware/main/main.c

          printf "idf_component_register(\n    SRCS \"main.c\"\n    INCLUDE_DIRS \".\"\n)\n" > firmware/main/CMakeLists.txt

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Create web flash manifest
        shell: bash
        run: |
          cd firmware/build
          printf '{\n  "name": "ESP-BOX Hub",\n  "version": "1.0",\n  "builds": [\n    {\n      "chipFamily": "ESP32-S3",\n      "parts": [\n        { "path": "bootloader/bootloader.bin", "offset": 0 },\n        { "path": "partition_table/partition-table.bin", "offset": 32768 },\n        { "path": "esp_box_hub.bin", "offset": 65536 }\n      ]\n    }\n  ]\n}\n' > manifest.json

      - name: Upload firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: espbox-webflash
          path: |
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
            firmware/build/esp_box_hub.bin
            firmware/build/manifest.json
