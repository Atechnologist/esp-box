name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Generate firmware project
        shell: bash
        run: |
          mkdir -p firmware/main
      
          printf "cmake_minimum_required(VERSION 3.16)\ninclude(\$ENV{IDF_PATH}/tools/cmake/project.cmake)\nproject(esp_box_hub)\n" > firmware/CMakeLists.txt
      
          printf "#include <string.h>\n#include \"freertos/FreeRTOS.h\"\n#include \"freertos/task.h\"\n#include \"esp_log.h\"\n#include \"esp_wifi.h\"\n#include \"nvs_flash.h\"\n#include \"esp_event.h\"\n#include \"esp_netif.h\"\n#include \"esp_http_server.h\"\n#include \"driver/gpio.h\"\n\n#define WIFI_SSID \"YOUR_WIFI\"\n#define WIFI_PASS \"YOUR_PASSWORD\"\n\n#define LED_GPIO 2\n\nstatic const char *TAG = \"ESP_BOX\";\n\nstatic const char html_page[] = \"<html><body><h1>ESP BOX HUB</h1><p><a href='/on'><button>LED ON</button></a></p><p><a href='/off'><button>LED OFF</button></a></p></body></html>\";\n\nesp_err_t root_handler(httpd_req_t *req){httpd_resp_send(req, html_page, HTTPD_RESP_USE_STRLEN);return ESP_OK;}\n\nesp_err_t led_on_handler(httpd_req_t *req){gpio_set_level(LED_GPIO,1);httpd_resp_sendstr(req,\"LED ON\");return ESP_OK;}\n\nesp_err_t led_off_handler(httpd_req_t *req){gpio_set_level(LED_GPIO,0);httpd_resp_sendstr(req,\"LED OFF\");return ESP_OK;}\n\nvoid start_webserver(){httpd_config_t config = HTTPD_DEFAULT_CONFIG();httpd_handle_t server=NULL;httpd_start(&server,&config);\nhttpd_uri_t root={.uri=\"/\",.method=HTTP_GET,.handler=root_handler};\nhttpd_uri_t on={.uri=\"/on\",.method=HTTP_GET,.handler=led_on_handler};\nhttpd_uri_t off={.uri=\"/off\",.method=HTTP_GET,.handler=led_off_handler};\nhttpd_register_uri_handler(server,&root);httpd_register_uri_handler(server,&on);httpd_register_uri_handler(server,&off);} \n\nvoid wifi_init(){esp_netif_init();esp_event_loop_create_default();esp_netif_create_default_wifi_sta();wifi_init_config_t cfg=WIFI_INIT_CONFIG_DEFAULT();esp_wifi_init(&cfg);\nwifi_config_t wifi_config={.sta={.ssid=WIFI_SSID,.password=WIFI_PASS}};esp_wifi_set_mode(WIFI_MODE_STA);esp_wifi_set_config(WIFI_IF_STA,&wifi_config);esp_wifi_start();esp_wifi_connect();}\n\nvoid app_main(void){ESP_LOGI(TAG,\"ESP BOX HUB STARTING\");nvs_flash_init();gpio_reset_pin(LED_GPIO);gpio_set_direction(LED_GPIO,GPIO_MODE_OUTPUT);wifi_init();vTaskDelay(pdMS_TO_TICKS(5000));start_webserver();ESP_LOGI(TAG,\"Web server started\");}\n" > firmware/main/main.c
      
          printf "idf_component_register(\nSRCS \"main.c\"\nINCLUDE_DIRS \".\"\nREQUIRES esp_wifi esp_http_server nvs_flash\n)\n" > firmware/main/CMakeLists.txt
      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Create web flash manifest
        shell: bash
        run: |
          cd firmware/build
          printf '{\n  "name": "ESP-BOX Hub",\n  "version": "1.0",\n  "builds": [\n    {\n      "chipFamily": "ESP32-S3",\n      "parts": [\n        { "path": "bootloader/bootloader.bin", "offset": 0 },\n        { "path": "partition_table/partition-table.bin", "offset": 32768 },\n        { "path": "esp_box_hub.bin", "offset": 65536 }\n      ]\n    }\n  ]\n}\n' > manifest.json

      - name: Upload firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: espbox-webflash
          path: |
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
            firmware/build/esp_box_hub.bin
            firmware/build/manifest.json
