name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build firmware
        shell: bash
        run: |
          cd examples/esp-box/firmware
          # Source ESP-IDF environment
          . $IDF_PATH/export.sh
          # Ensure dependencies are installed
          idf.py add-dependency lvgl/lvgl@9.5.0
          idf.py add-dependency espressif/esp_lvgl_port@2.7.2
          # Set the target and build
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
