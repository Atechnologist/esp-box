name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          cd firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Create Web Flash manifest
        run: |
          cd firmware/build
          printf '{
            "name": "ESP-BOX Hub",
            "version": "2.0",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "bootloader/bootloader.bin", "offset": 0 },
                  { "path": "partition_table/partition-table.bin", "offset": 32768 },
                  { "path": "esp_box.bin", "offset": 65536 }
                ]
              }
            ]
          }' > manifest.json

      - name: Upload firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: espbox-webflash
          path: |
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
            firmware/build/*.bin
            firmware/build/manifest.json
