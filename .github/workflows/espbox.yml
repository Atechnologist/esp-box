name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build firmware
        shell: bash
        run: |
          cd examples/esp-box/firmware
          # Export ESP-IDF environment
          . $IDF_PATH/export.sh
          # Set target to ESP32-S3
          idf.py set-target esp32s3
          # Clean previous builds
          idf.py fullclean
          # Build firmware
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
