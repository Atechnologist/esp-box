name: ESP-BOX Firmware Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =============================
      # 1. Checkout repository
      # =============================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =============================
      # 2. Cache ESP-IDF + Python deps
      # =============================
      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/.cache/pip
          key: ${{ runner.os }}-esp-idf

      # =============================
      # 3. Install ESP-IDF
      # =============================
      - name: Install ESP-IDF
        run: |
          git clone -b v5.2 --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
          cd $HOME/esp-idf
          ./install.sh esp32s3

      # =============================
      # 4. Export ESP-IDF environment
      # =============================
      - name: Set ESP-IDF environment
        run: |
          echo "IDF_PATH=$HOME/esp-idf" >> $GITHUB_ENV

      # =============================
      # 5. Prepare model file (safe fallback)
      # =============================
      - name: Prepare voice model
        run: |
          mkdir -p examples/esp-box/firmware/main/model

          if [ -f model.bin ]; then
            echo "Copying provided model.bin"
            cp model.bin examples/esp-box/firmware/main/model/model.bin
          else
            echo "No model provided — creating placeholder"
            touch examples/esp-box/firmware/main/model/model.bin
          fi

      # =============================
      # 6. Configure project + install deps
      # =============================
      - name: Install dependencies and configure
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          # Set target
          idf.py set-target esp32s3

          # Install managed components (creates managed_components/)
          idf.py install

          # Force partition table usage
          idf.py -D PARTITION_TABLE_CUSTOM_FILENAME=partitions.csv reconfigure

      # =============================
      # 7. Clean build (important for CI stability)
      # =============================
      - name: Clean build
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          idf.py fullclean

      # =============================
      # 8. Build firmware
      # =============================
      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $HOME/esp-idf/export.sh

          idf.py build

      # =============================
      # 9. Upload artifacts
      # =============================
      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp-box-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/*.elf
            examples/esp-box/firmware/build/*.map
