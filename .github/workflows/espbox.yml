name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clean old ESP-BOX dependencies
        run: |
         rm -f idf_component.yml
         rm -f main/idf_component.yml
         rm -rf managed_components


      - name: Fix Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE


      - name: Generate ESP-BOX project
        shell: bash
        run: |

          mkdir -p main
          mkdir -p components/relay_control

          ############################
          # Root CMake1
          ############################

          cat << 'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.16)
          include($ENV{IDF_PATH}/tools/cmake/project.cmake)
          project(esp_box_hub)
          EOF


          ############################
          # Main firmware
          ############################

          cat << 'EOF' > main/main.c
          #include "freertos/FreeRTOS.h"
          #include "freertos/task.h"
          #include "esp_log.h"

          #include "relay_control.h"

          static const char *TAG = "ESP_BOX_HUB";

          void app_main(void)
          {
              ESP_LOGI(TAG, "ESP BOX HUB STARTED");

              relay_init();

              while(1)
              {
                  ESP_LOGI(TAG, "Hub running");
                  vTaskDelay(pdMS_TO_TICKS(5000));
              }
          }
          EOF


          ############################
          # main CMake
          ############################

          cat << 'EOF' > main/CMakeLists.txt
          idf_component_register(
              SRCS "main.c"
              INCLUDE_DIRS "."
              REQUIRES relay_control
          )
          EOF


          ############################
          # Relay component
          ############################

          cat << 'EOF' > components/relay_control/relay_control.c
          #include "relay_control.h"
          #include "driver/gpio.h"

          #define RELAY_GPIO GPIO_NUM_2

          void relay_init()
          {
              gpio_config_t io_conf = {
                  .pin_bit_mask = (1ULL << RELAY_GPIO),
                  .mode = GPIO_MODE_OUTPUT
              };

              gpio_config(&io_conf);
          }

          void relay_on()
          {
              gpio_set_level(RELAY_GPIO, 1);
          }

          void relay_off()
          {
              gpio_set_level(RELAY_GPIO, 0);
          }
          EOF


          cat << 'EOF' > components/relay_control/relay_control.h
          #pragma once

          void relay_init(void);
          void relay_on(void);
          void relay_off(void);
          EOF


          cat << 'EOF' > components/relay_control/CMakeLists.txt
          idf_component_register(
              SRCS "relay_control.c"
              INCLUDE_DIRS "."
          )
          EOF


      - name: Build ESP-BOX firmware
        shell: bash
        run: |

          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build


      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            build/*.bin
            build/*.elf
