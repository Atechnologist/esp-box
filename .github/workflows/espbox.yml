name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.1

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix git safe directory
      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # Build firmware
      - name: Build firmware
        shell: bash
        run: |
          cd examples/esp-box/firmware
          
          # Source ESP-IDF environment
          . $IDF_PATH/export.sh
          
          # Add dependencies (no @* version specifier)
          idf.py add-dependency lvgl/lvgl
          idf.py add-dependency espressif/esp_lvgl_port
          idf.py add-dependency espressif/esp_box
          
          # Set target ESP32-S3
          idf.py set-target esp32s3
          
          # Build project
          idf.py build

      # Upload firmware binaries
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
