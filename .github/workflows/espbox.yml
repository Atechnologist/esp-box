name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Debug build output
        run: |
          echo "==== BUILD FILES ===="
          ls -la examples/esp-box/firmware/build

      - name: Create Web Flash manifest
        run: |
          cd examples/esp-box/firmware/build

          BIN_NAME=$(ls *.bin | grep -v bootloader | grep -v partition | head -n 1)

          echo "Detected firmware: $BIN_NAME"

          printf "{\n" > manifest.json
          printf "  \"name\": \"ESP-BOX Hub\",\n" >> manifest.json
          printf "  \"version\": \"2.0\",\n" >> manifest.json
          printf "  \"builds\": [\n" >> manifest.json
          printf "    {\n" >> manifest.json
          printf "      \"chipFamily\": \"ESP32-S3\",\n" >> manifest.json
          printf "      \"parts\": [\n" >> manifest.json
          printf "        { \"path\": \"bootloader/bootloader.bin\", \"offset\": 0 },\n" >> manifest.json
          printf "        { \"path\": \"partition_table/partition-table.bin\", \"offset\": 32768 },\n" >> manifest.json
          printf "        { \"path\": \"%s\", \"offset\": 65536 }\n" "$BIN_NAME" >> manifest.json
          printf "      ]\n" >> manifest.json
          printf "    }\n" >> manifest.json
          printf "  ]\n" >> manifest.json
          printf "}\n" >> manifest.json

      - name: Upload firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: espbox-webflash
          path: |
            examples/esp-box/firmware/build/bootloader/bootloader.bin
            examples/esp-box/firmware/build/partition_table/partition-table.bin
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/manifest.json
