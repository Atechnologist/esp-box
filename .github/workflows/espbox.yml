name: ESP-BOX HUB CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # ✅ USE STABLE ESP-IDF ENV (THIS FIXES YOUR ISSUE)
    container:
      image: espressif/idf:v5.1

    steps:
      # =============================
      # 1. Checkout
      # =============================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =============================
      # 2. Set target
      # =============================
      - name: Set target
        run: echo "IDF_TARGET=esp32s3" >> $GITHUB_ENV

      # =============================
      # 3. Prepare model (SAFE)
      # =============================
      - name: Prepare voice model
        run: |
          mkdir -p examples/esp-box/firmware/main/model

          if [ -f model.bin ]; then
            echo "Using provided model.bin"
            cp model.bin examples/esp-box/firmware/main/model/model.bin
          else
            echo "No model → placeholder"
            touch examples/esp-box/firmware/main/model/model.bin
          fi

      # =============================
      # 4. Clean build (CRITICAL)
      # =============================
      - name: Clean project
        run: |
          cd examples/esp-box/firmware

          rm -rf build
          rm -f sdkconfig
          rm -rf managed_components

      # =============================
      # 5. Build firmware (SIMPLE + STABLE)
      # =============================
      - name: Build firmware
        run: |
          cd examples/esp-box/firmware

          idf.py set-target esp32s3
          idf.py build

      # =============================
      # 6. Upload artifacts
      # =============================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/*.elf
