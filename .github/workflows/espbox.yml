name: ESP-BOX HUB CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.1

    steps:
      - uses: actions/checkout@v4

      - run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 🔥 Step 1: Load components
      - name: Prepare ESP-SR
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh
          idf.py reconfigure

      # 🔥 Step 2: Copy model BEFORE build
      - name: Copy ESP-SR model
        run: |
          cd examples/esp-box/firmware

          mkdir -p main/model

          echo "Searching for model..."
          find managed_components -name "*.bin"

          MODEL_PATH=$(find managed_components -name "*.bin" | head -n 1)

          if [ -z "$MODEL_PATH" ]; then
            echo "❌ No model found!"
            exit 1
          fi

          echo "Using model: $MODEL_PATH"

          cp "$MODEL_PATH" main/model/model.bin

          ls -l main/model/

      # 🔥 Step 3: Build
      - name: Build firmware
        run: |
          cd examples/esp-box/firmware
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build

      # 🔥 Step 4: Upload
      - uses: actions/upload-artifact@v4
        with:
          name: espbox-firmware
          path: |
            examples/esp-box/firmware/build/*.bin
            examples/esp-box/firmware/build/bootloader/*.bin
            examples/esp-box/firmware/build/partition_table/*.bin
