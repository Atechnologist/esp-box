name: Build ESP-Box Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-action@v1
        with:
          version: v5.1
          target: esp32s3

      - name: Build firmware
        working-directory: examples/esp-box
        run: |
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp-box-firmware
          path: |
            examples/esp-box/build/*.bin
            examples/esp-box/build/*.elf
            examples/esp-box/build/*.map
