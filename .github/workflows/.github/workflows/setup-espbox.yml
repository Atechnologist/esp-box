name: Setup ESP Box

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Create ESP-Box structure
        run: |

          mkdir -p firmware/main
          mkdir -p firmware/components/espnow
          mkdir -p firmware/components/voice_control
          mkdir -p firmware/components/hardware

          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.16)
          include($ENV{IDF_PATH}/tools/cmake/project.cmake)
          project(esp_box)
          EOF

          cat > firmware/CMakeLists.txt << 'EOF'
          idf_component_register(
              SRCS "main.c"
              INCLUDE_DIRS "."
              REQUIRES driver esp_netif esp_wifi esp_http_server
          )
          EOF

          cat > firmware/main/main.c << 'EOF'
          #include <stdio.h>
          #include "freertos/FreeRTOS.h"
          #include "freertos/task.h"
          #include "esp_log.h"

          static const char *TAG = "ESP_BOX";

          void app_main(void)
          {
              ESP_LOGI(TAG, "ESP Box running");
              while (1) {
                  vTaskDelay(pdMS_TO_TICKS(1000));
              }
          }
          EOF

          touch firmware/components/espnow/espnow.c
          touch firmware/components/voice_control/voice_control.c
          touch firmware/components/hardware/hardware.c

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto create ESP-Box structure" || echo "Nothing to commit"
          git push
